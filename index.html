<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Ibu Nikma</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0e0c;
      font-family: "Lora", Georgia, serif;
      padding: 4rem 2rem 6rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
      animation-delay: 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    p {
      margin-bottom: 2rem;
      font-size: 18px;
      line-height: 2.2;
      color: #e8c8cc;
      letter-spacing: 0.02em;
      font-weight: 400;
      font-style: italic;
    }

    p::first-letter {
      font-size: 4rem;
      font-weight: 400;
      font-style: italic;
      float: left;
      line-height: 0.75;
      margin-right: 10px;
      margin-top: 8px;
      color: #c9909a;
    }

    .penutup {
      font-size: 15px;
      color: #c9909a;
      opacity: 0.7;
      margin-top: 0.5rem;
      white-space: pre-line;
    }
    .penutup::first-letter {
      font-size: inherit;
      float: none;
      line-height: inherit;
      margin: 0;
      color: inherit;
    }

    /* Tanda tangan */
    .signature {
      margin-top: 3rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      pointer-events: none;
    }

    .sig-line {
      height: 1px;
      background: #a89880;
      margin-bottom: 10px;
      width: 0;
      opacity: 0;
      transform-origin: left center;
    }

    @keyframes lineSlide {
      0%   { width: 0; opacity: 0; transform: scaleX(0); }
      10%  { opacity: 1; }
      60%  { transform: scaleX(1.04); }
      80%  { transform: scaleX(0.98); }
      100% { width: 180px; opacity: 1; transform: scaleX(1); }
    }

    .signature.visible .sig-line {
      animation: lineSlide 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.1s;
    }

    .sig-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sig-name {
      font-family: "Dancing Script", cursive;
      font-size: 2rem;
      font-weight: 700;
      color: #c9909a;
      letter-spacing: 0.03em;
      overflow: hidden;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(18px);
    }

    @keyframes nameSlideUp {
      0%   { opacity: 0; transform: translateY(18px); }
      40%  { opacity: 1; }
      70%  { transform: translateY(-4px); }
      85%  { transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .signature.visible .sig-name {
      animation: nameSlideUp 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.9s;
    }

    .sig-heart {
      width: 36px;
      height: 34px;
      opacity: 0;
      transform: scale(0.3) rotate(-15deg);
      flex-shrink: 0;
    }

    @keyframes heartPop {
      0%   { opacity: 0; transform: scale(0.3) rotate(-15deg); }
      50%  { opacity: 1; transform: scale(1.18) rotate(4deg); }
      70%  { transform: scale(0.92) rotate(-2deg); }
      85%  { transform: scale(1.06) rotate(1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .signature.visible .sig-heart {
      animation: heartPop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1.8s;
    }

    /* Foto */
    .photo-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .photo-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .photo-wrap img {
      width: 200px;
      height: auto;
      object-fit: cover;
      border-radius: 8px;
      filter: grayscale(20%) sepia(10%);
    }

    /* QR */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      margin-top: 2.5rem;
      padding-bottom: 3rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .qr-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .qr-label {
      font-family: "Lora", Georgia, serif;
      font-style: italic;
      font-size: 15px;
      color: #c9909a;
      opacity: 0.7;
      letter-spacing: 0.06em;
    }
    .qr-wrap img {
      width: 200px;
      height: 200px;
      border-radius: 0;
      filter: invert(1) sepia(0.15) hue-rotate(300deg) brightness(0.9) saturate(0.6);
    }
  </style>
</head>

  <script>
    const paragraf1 = "Ibu Nikma, terima kasih atas ilmu pengetahuannya untuk satu tahun terakhir. Ibu Nikma membuat sekolah yang dulunya aku malas untuk datangi, sekarang terasa seperti rumah kedua aku. Saat aku tahu bahwa waktu aku di kelas 5 ini sudah selesai, aku merasa hampa dan bingung, karena tanpa Ibu Nikma aku yakin bahwa guru yang akan menggantikan Ibu Nikma di kelas 6 nanti tidak akan dan tidak pernah sama seperti Ibu Nikma. Momen-momen berkesan yang dilalui bersama Ibu Nikma tak terhitung banyaknya. Gila, bagaimana satu guru bisa mengubah kepribadianku selama satu tahun, dan sekarang aku menjadi pribadi yang lebih baik atas bimbingan Ibu Nikma.";
    const paragraf2 = "Ibu Nikma membimbing aku untuk mencapai prestasi yang jumlahnya hampir terlalu banyak untuk jadi kenyataan, baik dari segi di dalam sekolah maupun di luar sekolah. Dari dulu sampai sekarang aku masih tidak bisa mengontrol emosi jika merasa gagal, tetapi Ibu Nikma selalu menyemangati aku dari belakang dan terus menasihati aku. Sampai sekarang aku masih belum bisa mengontrol emosi secara baik, dan itulah kenapa saat aku melihat sertifikat Peringkat Pertama, aku langsung bereaksi seperti biasa, tapi aku tidak menangis seperti biasa. Aku menangis, tetapi tidak bersuara, jadi cuma turun beberapa tetes air mata saja, karena selalu jika mencapai sesuatu yang sudah diinginkan dalam waktu yang lama — lima semester — saat tercapai rasanya itu aneh, feels surreal.";
    const paragraf3 = "After all, semuanya pasti akan ada akhirnya. Namun sampai sekarang aku berharap Ibu Nikma memilih untuk mengajar kami lagi, karena Ibu Nikma itu beda dari yang lain. Special. Irreplaceable. Dan jika Ibu Nikma tidak ingin mengajar kami lagi, itu tidak apa-apa, lagian itu adalah keputusan Ibu. Namun jika Ibu Nikma mengajar kami lagi, aku janji akan menuruti semua yang Ibu katakan. Janji.";
    const paragraf4 = "Kelas 5A adalah kelas yang paling buruk dari segi pribadi, namun dari segi kelasnya, kelas 5A ini tidak akan pernah terasa sama lagi. Tidak akan ada yang bisa menggantikan pengalaman berkesan kami selama kelas 5 ini. Namun saatnya untuk berpisah.";
    const penutup   = "What a bittersweet end to a journey.\nBut now it's just a monument in my mind, in my mind.";

    document.getElementById("teks2").textContent = paragraf2;
    document.getElementById("teks3").textContent = paragraf3;
    document.getElementById("teks4").textContent = paragraf4;
    document.getElementById("teks5").textContent = penutup;
    document.getElementById("sigName").textContent = "Darrel Khalfani";

    const signature = document.getElementById("signature");
    const photoWrap = document.getElementById("photoWrap");
    const qrWrap    = document.getElementById("qrWrap");

    // Tunggu sampai user benar-benar scroll ke bawah
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
          signature.classList.add("visible");
          setTimeout(() => photoWrap.classList.add("visible"), 400);
          setTimeout(() => qrWrap.classList.add("visible"), 900);
          observer.disconnect();

    observer.observe(signature);
